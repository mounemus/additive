name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    env:
      # Valeurs factices : le build n'accède pas à la base (repli statique),
      # mais Prisma exige que les variables existent.
      DATABASE_URL: "postgresql://ci:ci@localhost:5432/ci"
      DATABASE_URL_UNPOOLED: "postgresql://ci:ci@localhost:5432/ci"
      NEXTAUTH_SECRET: "ci-secret-not-used-in-prod-0000000000"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Installer les dépendances
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Tests (moteurs de prix)
        run: npm test

      - name: Build
        run: npm run build
